<div class="achievements-container">
    <h3>🏆 Všechny Úspěchy (Milestones)</h3>
    <div class="achievements-grid">
        {% for ach in achievements %}
            <div class="achievement-card {% if ach.unlocked %}unlocked{% else %}locked{% endif %}">
                <h4>
                    {% if ach.unlocked %}🔓{% else %}🔒{% endif %} 
                    {{ ach.title }}
                </h4>
                <p class="achievement-desc">{{ ach.desc }}</p>
            </div>
        {% empty %}
            <p>Žádné milníky nebyly v administraci nalezeny.</p>
        {% endfor %}
    </div>
</div>
