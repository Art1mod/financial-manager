<div class="achievements-container">
    <h3>🏆 Všechny Úspěchy (Milestones)</h3>
    <div class="achievements-grid" style="display: flex; gap: 20px; margin-bottom: 20px;">
        {% for ach in achievements %}
            <div class="achievement-card {% if ach.unlocked %}unlocked{% else %}locked{% endif %}" 
                 style="border: 1px solid {% if ach.unlocked %}#28a745{% else %}#ccc{% endif %}; 
                        background-color: {% if ach.unlocked %}#e8f5e9{% else %}#f8f9fa{% endif %}; 
                        padding: 15px; border-radius: 5px; flex: 1; opacity: {% if ach.unlocked %}1{% else %}0.6{% endif %};">
                <h4>
                    {% if ach.unlocked %}🔓{% else %}🔒{% endif %} 
                    {{ ach.title }}
                </h4>
                <p style="margin: 5px 0 0 0; font-size: 0.9em; color: #555;">{{ ach.desc }}</p>
            </div>
        {% empty %}
            <p>Žádné milníky nebyly v administraci nalezeny.</p>
        {% endfor %}
    </div>
</div>
