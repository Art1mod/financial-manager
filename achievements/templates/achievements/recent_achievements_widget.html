<div class="recent-achievements-banner" id="recent-achievements-container">
    <h4>🎯 Poslední odemčené úspěchy</h4>
    <div class="mini-achievements-grid" id="mini-achievements-target">
        {% for ua in recent_achievements %}
            <div class="mini-achievement-card">
                <h5>🔓 {{ ua.achievement.title }}</h5>
                <p>{{ ua.achievement.description }}</p>
            </div>
        {% empty %}
            <p class="empty-achievements-text">Zatím jste neodemkli žádné výkonnostní milníky.</p>
        {% endfor %}
    </div>
</div>
