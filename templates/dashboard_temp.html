<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>🎉 Vítejte na palubě!</h1>
    <p>Úspěšně jste se přihlásili. Toto je dočasný dashboard.</p>
    
    {% if user.is_authenticated %}
        <p>Přihlášený uživatel: <strong>{{ user.username }}</strong></p>
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit">Odhlásit se</button>
        </form>
    {% endif %}
</body>
</html>
