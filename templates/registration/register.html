{% load static %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Registrace</title>
    <link rel="stylesheet" href="{% static 'budget/css/auth.css' %}">
</head>
<body>

    <div class="login-box">
        <h2>Vytvořit nový účet</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Zaregistrovat se</button>
        </form>
        
        <p class="auth-footer">
            Již máte účet? <a href="{% url 'login' %}">Přihlaste se zde</a>
        </p>
    </div>

</body>
</html>
